id: weekly_builder
name: "Construtor Semanal"
archetype: builder
schedule: weekly
description: "O desafio dos pedreiros: extraia pedra em massa, acumule XP de Construção Civs e erga uma padaria."
requires:
  - builder_path
  - sprint2_civs_skills
objectives:
  - id: mine_stone
    type: mine_block
    block: stone
    amount: 150
    description: "Mine 150 blocos de pedra"
  - id: earn_building_xp
    type: civs_skill_xp
    skill: building
    amount: 200
    description: "Ganhe 200 XP de Construção Civs"
  - id: build_bakery
    type: build_region
    region: bakery
    description: "Construa uma padaria (bakery)"
rewards:
  money: 350
  civs-skill-xp:
    building: 200
    mining: 100
  skill-xp:
    foraging: 500
  permission: rpg.quest.weekly_builder
unlocks-perk: builder_fortress

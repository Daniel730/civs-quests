id: weekly_builder
name: "Construtor Semanal"
archetype: builder
schedule: weekly
description: "O desafio dos pedreiros: extraia pedra em massa, acumule XP de Mineração Civs e erga um armazém digno do seu território via /cv menu."
requires:
  - builder_path
  - sprint2_civs_skills
objectives:
  - id: mine_stone
    type: mine_block
    block: stone
    amount: 150
    description: "Mine 150 blocos de pedra"
  - id: earn_mining_xp
    type: civs_skill_xp
    skill: mining
    amount: 200
    description: "Ganhe 200 XP de mineração Civs"
  - id: build_warehouse
    type: build_region
    region: warehouse
    description: "Construa um armazém (warehouse)"
rewards:
  money: 350
  civs-skill-xp:
    building: 150
    mining: 100
  skill-xp:
    foraging: 500
  permission: rpg.quest.weekly_builder
unlocks-perk: builder_fortress

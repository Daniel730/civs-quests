id: mercador_fortuna
name: "Fortuna do Mercador"
archetype: merchant
description: "Após abrir sua fachada: acumule receita na ChestShop e mantenha saldo mínimo."
requires:
  - merchant_shop_front
objectives:
  - id: shop_income
    type: shop_revenue
    amount: 500
    description: "Receba 500 moedas de vendas na sua loja"
  - id: rich_enough
    type: balance_min
    amount: 1000
    description: "Tenha pelo menos 1000 moedas no saldo"
rewards:
  money: 150
  skill-xp:
    farming: 250
  permission: rpg.quest.mercador_fortuna
unlocks-perk: merchant_bazaar

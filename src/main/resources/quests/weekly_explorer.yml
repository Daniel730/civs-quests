requires:
  - first_steps
objectives:
  - id: visit_spawn_obelisk
    type: discover_poi
    poi: spawn_obelisk
    description: "Visite o Obelisco de Spawn"
  - id: visit_market_crossroads
    type: discover_poi
    poi: market_crossroads
    description: "Visite o Cruzamento do Mercado"
  - id: visit_training_yard
    type: discover_poi
    poi: training_yard

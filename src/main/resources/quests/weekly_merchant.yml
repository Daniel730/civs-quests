id: weekly_merchant
name: "Comerciante Semanal"
archetype: merchant
schedule: weekly
description: "Domine o comércio do reino: negocie em ChestShops, movimente o leilão Civs (/cv menu → Casa de Leilões) e prove que ouro flui pelas suas mãos."
requires:
  - merchant_path
  - sprint2_auction
objectives:
  - id: shop_purchases
    type: shop_buy
    amount: 12
    description: "Compre 12 vezes em lojas ChestShop"
  - id: shop_sales
    type: shop_sell
    amount: 12
    description: "Venda 12 vezes em lojas ChestShop"
  - id: auction_trades
    type: auction_buy
    amount: 3
    description: "Compre 3 itens no leilão Civs"
rewards:
  money: 400
  skill-xp:
    farming: 500
  permission: rpg.quest.weekly_merchant

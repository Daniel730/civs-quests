name: RPGServer
main: dev.daniel730.rpgserver.RpgServerPlugin
version: ${project.version}
api-version: '1.21'
description: Camada RPG com quests, progressão e integrações de servidor.
author: Daniel730
load: POSTWORLD

libraries:
  - net.luckperms:api:5.4

depend:
  - Vault

softdepend:
  - Civs
  - AuraSkills
  - ChestShop
  - Essentials
  - InteractiveBooks
  - PlaceholderAPI
  - LuckPerms
  - VeinMiner

commands:
  rpg:
    description: Comandos principais do RPG Server
    usage: /rpg [help|quest <list|status|accept|track|book>|book|journal|perks|profile|sync|reload]
    aliases: [rpgserver]

permissions:
  rpg.admin:
    description: Acesso administrativo ao RPG Server
    default: op
  rpg.profile:
    description: Ver perfil de progressão
    default: true
  rpg.quest:
    description: Listar, aceitar, rastrear e gerenciar quests
    default: true
  rpg.perks:
    description: Listar perks desbloqueados e disponíveis
    default: true

loadafter:
  - Vault
  - Civs
  - AuraSkills
  - ChestShop
  - Essentials
  - PlaceholderAPI
  - LuckPerms
